// ─── Bookmarks (shared) ───────────────────────────────────────────────────────
// Storage shape: { [doc_id:page]: { doc_id, filename, filepath, page, snippet, section, score, savedAt } }
const BOOKMARKS_KEY = 'docsense_bookmarks_v1';
function bookmarkKey(doc_id, page) { return doc_id + ':' + (page || 0); }
function loadBookmarks() {
  try {
    const raw = JSON.parse(localStorage.getItem(BOOKMARKS_KEY) || '{}');
    // Migrate older array-of-keys format (no metadata) by discarding it — those
    // entries have no metadata to display anyway.
    if (Array.isArray(raw)) return {};
    return raw && typeof raw === 'object' ? raw : {};
  } catch(e) { return {}; }
}
function saveBookmarks(obj) {
  try { localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(obj)); } catch(e) {}
}

// Build the metadata payload we want to keep when bookmarking a result.
function bookmarkPayload(r) {
  return {
    doc_id:   r.doc_id,
    filename: r.filename || r.specShort,
    filepath: r.filepath || '',
    page:     r.page || 0,
    section:  r.section || '',
    score:    r.score || 0,
    snippet:  ((r.context && r.context.match) || r.excerpt || '').slice(0, 280),
    savedAt:  Date.now(),
  };
}

// ─── PreviewPanel ─────────────────────────────────────────────────────────────
function PreviewPanel({ result, bookmarks = {}, setBookmarks = () => {} }) {
  const T = useT();
  const lang = React.useContext(LangCtx);
  const [tab, setTab] = React.useState('context');
  const [flash, setFlash] = React.useState('');

  const showFlash = React.useCallback((msg) => {
    setFlash(msg);
    setTimeout(() => setFlash(''), 1200);
  }, []);

  if (!result) {
    return (
      <section className="preview">
        <div className="empty">
          <div>
            <div className="ico"><Icon.page /></div>
            {T('empty_msg')}
          </div>
        </div>
      </section>
    );
  }

  const bmKey = bookmarkKey(result.doc_id, result.page);
  const isBookmarked = !!bookmarks[bmKey];

  const toggleBookmark = () => {
    const next = { ...bookmarks };
    if (next[bmKey]) delete next[bmKey];
    else             next[bmKey] = bookmarkPayload(result);
    setBookmarks(next);
    saveBookmarks(next);
  };

  const fileUrl = (download) => {
    if (!result.doc_id) return null;
    const q = download ? '?download=1' : '';
    const hash = !download && result.page ? '#page=' + result.page : '';
    return '/api/file/' + encodeURIComponent(result.doc_id) + q + hash;
  };

  const openFile = () => {
    const fp = result.filepath || '';
    const isPdf = fp.toLowerCase().endsWith('.pdf');
    if (isPdf) {
      const url = fileUrl(false);
      if (url) window.open(url, '_blank', 'noopener');
    } else if (result.doc_id) {
      fetch('/api/open/' + encodeURIComponent(result.doc_id), { method: 'POST' });
    }
  };

  const downloadFile = () => {
    const url = fileUrl(true);
    if (url) window.location.href = url;
  };

  const copyText = async () => {
    try {
      await navigator.clipboard.writeText(result.context.match || result.excerpt || '');
      showFlash(T('copy_text') + ' ✓');
    } catch(e) { showFlash('✗'); }
  };

  const copyCitation = async () => {
    const cite = result.spec + (result.page ? ', p. ' + result.page : '');
    try {
      await navigator.clipboard.writeText(cite);
      showFlash(T('copy_citation') + ' ✓');
    } catch(e) { showFlash('✗'); }
  };

  const fused = result.score, bm = result.bm25, sem = result.semantic;
  const metaJson = [
    '{',
    '  "doc_id":      "' + result.specShort.toLowerCase() + '",',
    '  "vendor":      "' + result.vendor + '",',
    '  "spec_type":   "' + result.type + '",',
    '  "category":    "' + result.category + '",',
    '  "version":     "' + result.version + '",',
    '  "published":   "' + result.date + '",',
    '  "page":        ' + result.page + ',',
    '  "section":     "' + result.section + '",',
    '  "chunk_id":    "' + result.id + '_p' + result.page + '_s4",',
    '  "tokens":      342,',
    '  "lang":        "en-US",',
    '  "embedder":    "bge-large-en-v1.5",',
    '  "fused_score": ' + result.score,
    '}'
  ].join('\n');

  return (
    <section className="preview">
      <div className="preview-head">
        <div className="crumbs"></div>
        {flash && (
          <span style={{ fontSize: 11, color: 'var(--accent)', fontFamily: 'var(--font-mono)' }}>
            {flash}
          </span>
        )}
        <button
          className="iconbtn"
          onClick={toggleBookmark}
          data-tip={isBookmarked
            ? (lang === 'zh' ? '已加入收藏' : 'Bookmarked')
            : (lang === 'zh' ? '加入收藏'   : 'Bookmark')}
          style={isBookmarked ? { color: 'var(--accent)' } : null}
        >
          {isBookmarked ? <Icon.bookmarkFill /> : <Icon.bookmark />}
        </button>
        <button className="iconbtn" onClick={openFile} data-tip={result.filepath}>
          <Icon.external /> {T('open')}
        </button>
      </div>

      <div className="preview-meta">
        <div className="metaitem"><span className="l">{T('meta_doc')}</span><span className="v mono">{result.specShort}</span></div>
        <div className="metaitem align-right"><span className="l">{T('meta_page')}</span><span className="v mono">{result.page}</span></div>
      </div>

      <div className="preview-scoring">
        <div className="barwrap">
          <div className="lab"><span className="name" data-tip={T('score_fused_tip')}><span className="dot fused"></span>{T('score_fused')}</span><span className="val">{fused.toFixed(4)}</span></div>
          <div className="bar"><div style={{ width: fused * 100 + '%', background: 'var(--accent)' }}></div></div>
        </div>
        <div className="barwrap">
          <div className="lab"><span className="name" data-tip={T('score_bm25_tip')}><span className="dot bm"></span>BM25</span><span className="val">{bm.toFixed(4)}</span></div>
          <div className="bar"><div style={{ width: bm * 100 + '%', background: '#f59e0b' }}></div></div>
        </div>
        <div className="barwrap">
          <div className="lab"><span className="name" data-tip={T('score_cos_tip')}><span className="dot sem"></span>cos</span><span className="val">{sem.toFixed(4)}</span></div>
          <div className="bar"><div style={{ width: sem * 100 + '%', background: '#8b5cf6' }}></div></div>
        </div>
      </div>

      <div className="preview-tabs">
        <button className={tab === 'context'  ? 'active' : ''} onClick={() => setTab('context')} >{T('tab_context')}</button>
        <button className={tab === 'match'    ? 'active' : ''} onClick={() => setTab('match')}   >{T('tab_match')}</button>
        <button className={tab === 'metadata' ? 'active' : ''} onClick={() => setTab('metadata')}>{T('tab_metadata')} <span className="ctsmall">12</span></button>
        <button className={tab === 'related'  ? 'active' : ''} onClick={() => setTab('related')} >{T('tab_related')}  <span className="ctsmall">7</span></button>
      </div>

      <div className="preview-body preview-text">
        {tab === 'context' && <>
          <div className="ctx-block">
            <div className="ctx-label">{T('ctx_preceding')} · {T('page_short')} {result.page - 1}</div>
            {highlightText(result.context.before, result.highlight)}
          </div>
          <div className="ctx-block match">
            <div className="ctx-label">{T('ctx_matched')} · {T('page_short')} {result.page}</div>
            {highlightText(result.context.match, result.highlight)}
          </div>
          <div className="ctx-block">
            <div className="ctx-label">{T('ctx_following')} · {T('page_short')} {result.page + 1}</div>
            {highlightText(result.context.after, result.highlight)}
          </div>
        </>}
        {tab === 'match' && <>
          <h3 className="section-h">{T('matched_only')}</h3>
          <div style={{ whiteSpace: 'pre-wrap' }}>{highlightText(result.context.match, result.highlight)}</div>
        </>}
        {tab === 'metadata' && (
          <pre style={{ margin: 0, fontFamily: 'var(--font-mono)', fontSize: 12 }}>{metaJson}</pre>
        )}
        {tab === 'related' && (
          <div style={{ fontSize: 12.5, fontFamily: 'var(--font-sans)', color: 'var(--fg-muted)' }}>
            <p>{T('other_chunks')} <strong style={{ color: 'var(--fg)' }}>{result.spec}</strong></p>
            <ul style={{ paddingLeft: 18, lineHeight: 1.9 }}>
              <li>§ 4.3.6 — Pre-Boot Communication Channel · {T('page_short')} {result.page - 1}</li>
              <li>§ 4.3.8 — MKHI Command Set Negotiation · {T('page_short')} {result.page + 2}</li>
              <li>§ 4.4.1 — HECI Reset and Recovery · {T('page_short')} {result.page + 5}</li>
              <li>§ 5.1 — Provisioning Flow Overview · {T('page_short')} {result.page + 18}</li>
            </ul>
          </div>
        )}
      </div>

      <div className="preview-actions">
        <button className="iconbtn" onClick={copyCitation}><Icon.copy /> {T('copy_citation')}</button>
        <button className="iconbtn" onClick={copyText}><Icon.copy /> {T('copy_text')}</button>
        <span className="spacer"></span>
        <button className="iconbtn" onClick={downloadFile}><Icon.download /> {T('download_pdf')}</button>
      </div>
    </section>
  );
}

// ─── BookmarksView ────────────────────────────────────────────────────────────
function BookmarksView({ bookmarks, setBookmarks, onBack }) {
  const T = useT();
  const lang = React.useContext(LangCtx);
  const items = React.useMemo(
    () => Object.entries(bookmarks)
      .map(([key, b]) => ({ key, ...b }))
      .sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0)),
    [bookmarks],
  );

  const remove = (key) => {
    const next = { ...bookmarks };
    delete next[key];
    setBookmarks(next);
    saveBookmarks(next);
  };

  const clearAll = () => {
    const msg = lang === 'zh'
      ? `確定要清空全部 ${items.length} 筆收藏？`
      : `Clear all ${items.length} bookmarks?`;
    if (window.confirm(msg)) {
      setBookmarks({});
      saveBookmarks({});
    }
  };

  const openItem = (b) => {
    if (!b.doc_id) return;
    const hash = b.page ? '#page=' + b.page : '';
    window.open('/api/file/' + encodeURIComponent(b.doc_id) + hash, '_blank', 'noopener');
  };

  const downloadItem = (b) => {
    if (!b.doc_id) return;
    window.location.href = '/api/file/' + encodeURIComponent(b.doc_id) + '?download=1';
  };

  const formatDate = (ms) => {
    if (!ms) return '';
    try { return new Date(ms).toLocaleString(lang === 'zh' ? 'zh-TW' : 'en-US'); }
    catch(e) { return ''; }
  };

  return (
    <section className="results" style={{ gridColumn: '1 / -1', padding: '16px 20px 24px' }}>
      <div className="results-head">
        <button
          className="iconbtn"
          onClick={onBack}
          data-tip={T('bookmarks_back')}
          style={{ marginRight: 8 }}
        >
          <Icon.back /> {T('bookmarks_back')}
        </button>
        <span className="ct">
          <strong>{items.length}</strong> {T('bookmarks_count')}
        </span>
        <span className="spacer"></span>
        {items.length > 0 && (
          <button className="iconbtn" onClick={clearAll} data-tip={T('bookmarks_clear_all')}>
            <Icon.trash /> {T('bookmarks_clear_all')}
          </button>
        )}
      </div>

      {items.length === 0 ? (
        <div className="empty" style={{ marginTop: 40 }}>
          <div>
            <div className="ico"><Icon.bookmark /></div>
            {T('bookmarks_empty')}
          </div>
        </div>
      ) : (
        <div className="result-list">
          {items.map((b, i) => {
            const ext = (b.filename || '').split('.').pop().toUpperCase();
            return (
              <div key={b.key} className="result">
                <div className="num">#{String(i + 1).padStart(2, '0')}</div>
                <div className="body">
                  <div className="result-row1">
                    {ext && <span className="tag">{ext}</span>}
                    <span className="specname">{b.filename || b.doc_id}</span>
                    <span className="spacer"></span>
                    {b.score > 0 && (
                      <span className={'score-pill' + scoreClass(b.score)}>
                        {b.score.toFixed(4)}
                      </span>
                    )}
                  </div>
                  <div className="result-row2">
                    {b.page > 0 && (
                      <>
                        <span className="pg">{T('page_short')} {b.page}</span>
                        <span className="sep">·</span>
                      </>
                    )}
                    <span className="section" style={{ color: 'var(--fg-muted)' }}>
                      {b.filepath || b.section}
                    </span>
                  </div>
                  {b.snippet && <div className="excerpt">{b.snippet}</div>}
                  <div className="result-row3" style={{ gap: 8 }}>
                    <button
                      className="iconbtn"
                      onClick={() => openItem(b)}
                      data-tip={b.filepath}
                    >
                      <Icon.external /> {T('bookmarks_open')}
                    </button>
                    <button className="iconbtn" onClick={() => downloadItem(b)}>
                      <Icon.download /> {T('download_pdf')}
                    </button>
                    <span className="spacer"></span>
                    <span style={{ fontSize: 11, color: 'var(--fg-faint)', fontFamily: 'var(--font-mono)' }}>
                      {formatDate(b.savedAt)}
                    </span>
                    <button
                      className="iconbtn"
                      onClick={() => remove(b.key)}
                      data-tip={T('bookmarks_remove')}
                    >
                      <Icon.trash />
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </section>
  );
}

// ─── StatusBar ────────────────────────────────────────────────────────────────
function StatusBar({ totalMs, mode, results }) {
  const T = useT();
  return (
    <div className="statusbar">
      <span className="item"><span className="ok">●</span> {T('sb_connected')}</span>
      <span className="item">{T('sb_mode')} {mode}</span>
      <span className="item">{T('sb_embedder')}</span>
      <span className="item">{T('sb_alpha')}</span>
      <span className="spacer"></span>
      <span className="item">{T('sb_cache')}</span>
      <span className="item">{results.length} {T('sb_chunks')} · {totalMs}ms</span>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const saved = React.useMemo(loadPrefs, []);

  const [theme,    setTheme]    = React.useState(saved.theme    || 'light');
  const [lang,     setLang]     = React.useState(saved.lang     || 'en');
  const [query,    setQuery]    = React.useState('');
  const [mode,     setMode]     = React.useState('hybrid');
  const [filters,  setFilters]  = React.useState({ vendor: [], type: [], category: [], tags: [] });
  const [selectedId, setSelectedId] = React.useState(null);
  const [sortKey,  setSortKey]  = React.useState('score');
  const [cardMode, setCardMode] = React.useState(saved.cardMode || 'detailed');
  const [totalMs, setTotalMs]   = React.useState(0);

  // Tags data (custom tags + assignments, persisted in localStorage)
  const [tagsData, setTagsData] = React.useState(loadTagsData);

  // API state
  const [results,     setResults]     = React.useState([]);
  const [loading,     setLoading]     = React.useState(false);
  const [error,       setError]       = React.useState(null);
  const [hasSearched, setHasSearched] = React.useState(false);
  const [status,      setStatus]      = React.useState({ ok: false, total_documents: 0, total_chunks: 0, collection_points: 0 });

  // View routing: 'search' (default), 'bookmarks', or 'documents'
  const [view, setView] = React.useState('search');

  // Rail resize (left: filters | results)
  const [railW, setRailW] = React.useState(240);
  const resizerPillRef = React.useRef(null);
  React.useEffect(() => {
    document.documentElement.style.setProperty('--rail-w', railW + 'px');
  }, [railW]);
  const onResizerMouseDown = React.useCallback((e) => {
    e.preventDefault();
    const startX = e.clientX;
    const startW = railW;
    resizerPillRef.current?.classList.add('dragging');
    const onMove = (ev) => {
      const next = Math.max(140, Math.min(480, startW + ev.clientX - startX));
      setRailW(next);
    };
    const onUp = () => {
      resizerPillRef.current?.classList.remove('dragging');
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }, [railW]);

  // Preview resize (right: results | preview)
  const [previewW, setPreviewW] = React.useState(460);
  const previewPillRef = React.useRef(null);
  React.useEffect(() => {
    document.documentElement.style.setProperty('--preview-w', previewW + 'px');
  }, [previewW]);
  const onPreviewResizerMouseDown = React.useCallback((e) => {
    e.preventDefault();
    const startX = e.clientX;
    const startW = previewW;
    previewPillRef.current?.classList.add('dragging');
    const onMove = (ev) => {
      const next = Math.max(300, Math.min(800, startW - (ev.clientX - startX)));
      setPreviewW(next);
    };
    const onUp = () => {
      previewPillRef.current?.classList.remove('dragging');
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }, [previewW]);

  // Bookmarks (lifted up so Topbar count + Bookmarks page + PreviewPanel share one source)
  const [bookmarks, setBookmarks] = React.useState(loadBookmarks);
  const bookmarkCount = Object.keys(bookmarks).length;

  // Poll backend status so the topbar dot reflects reality.
  React.useEffect(() => {
    let alive = true;
    const fetchStatus = async () => {
      try {
        const r = await fetch('/api/status');
        if (!r.ok) throw new Error('status ' + r.status);
        const d = await r.json();
        if (alive) setStatus({ ok: true, ...d });
      } catch(e) {
        if (alive) setStatus(s => ({ ...s, ok: false }));
      }
    };
    fetchStatus();
    const id = setInterval(fetchStatus, 10000);
    return () => { alive = false; clearInterval(id); };
  }, []);

  const [tweaks, setTweakState] = React.useState({
    layout:    saved.layout    || 'sidebar',
    density:   saved.density   || 'balanced',
    accent:    saved.accent    || 'indigo',
    typeset:   saved.typeset   || 'inter-mono',
    cardMode:  saved.cardMode  || 'detailed',
    highlight: saved.highlight || 'yellow',
  });

  const setTweak = React.useCallback((keyOrObj, val) => {
    const edits = typeof keyOrObj === 'object' ? keyOrObj : { [keyOrObj]: val };
    setTweakState(prev => ({ ...prev, ...edits }));
  }, []);

  // Persist preferences to localStorage
  React.useEffect(() => {
    try { localStorage.setItem(PREFS_KEY, JSON.stringify({ theme, lang, ...tweaks })); } catch(e) {}
  }, [theme, lang, tweaks]);

  // Apply all preferences to the document root
  React.useEffect(() => {
    const r = document.documentElement;
    r.dataset.theme    = theme;
    r.dataset.layout   = tweaks.layout;
    r.dataset.density  = tweaks.density;
    r.dataset.accent   = tweaks.accent;
    r.dataset.typeset  = tweaks.typeset;
    r.dataset.card     = tweaks.cardMode;
    r.dataset.highlight = tweaks.highlight;
    r.lang             = lang === 'zh' ? 'zh-TW' : 'en';
  }, [theme, lang, tweaks]);

  const allResults = results;

  const onSearch = React.useCallback(async () => {
    if (!query.trim()) return;
    const t0 = Date.now();
    setLoading(true);
    setError(null);
    try {
      const modeParam = mode === 'bm25' ? 'keyword' : mode;
      const res = await fetch(
        '/api/search?q=' + encodeURIComponent(query) +
        '&mode=' + modeParam +
        '&limit=20'
      );
      if (!res.ok) throw new Error('Server error ' + res.status);
      const data = await res.json();
      const mapped = (data.results || []).map((r, i) => mapResult(r, query, i));
      setResults(mapped);
      setTotalMs(data.took_ms != null ? Math.round(data.took_ms) : Date.now() - t0);
      setHasSearched(true);
      setSelectedId(mapped.length > 0 ? mapped[0].id : null);
    } catch(e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, [query, mode]);

  const filtered = React.useMemo(() => {
    let rs = allResults.filter(r => {
      if (filters.vendor.length && !filters.vendor.includes(r.vendor)) return false;
      if (filters.type.length   && !filters.type.includes(r.type))     return false;
      if (filters.tags && filters.tags.length) {
        const folder = getFolderName(r.filepath);
        const assigned = tagsData.assignments[r.doc_id] || [];
        const match = filters.tags.some(key => {
          if (key.startsWith('folder:')) return folder === key.slice(7);
          if (key.startsWith('custom:')) return assigned.includes(key.slice(7));
          return false;
        });
        if (!match) return false;
      }
      return true;
    });
    if      (sortKey === 'name') rs = [...rs].sort((a, b) => a.spec.localeCompare(b.spec));
    else                         rs = [...rs].sort((a, b) => b.score - a.score);
    return rs;
  }, [filters, sortKey, allResults, tagsData]);

  React.useEffect(() => {
    if (filtered.length && !filtered.find(r => r.id === selectedId)) {
      setSelectedId(filtered[0].id);
    }
  }, [filtered, selectedId]);

  const selected   = filtered.find(r => r.id === selectedId) || null;
  const openPrefs  = () => window.postMessage({ type: '__activate_edit_mode' }, '*');
  const prefsTitle = lang === 'zh' ? '偏好設定' : 'Preferences';

  const inBookmarks = view === 'bookmarks';
  const inDocuments = view === 'documents';
  const inSearch    = !inBookmarks && !inDocuments;

  return (
    <LangCtx.Provider value={lang}>
      <div className="app">
        <Topbar
          theme={theme} setTheme={setTheme}
          lang={lang} setLang={setLang}
          onOpenPrefs={openPrefs}
          status={status}
          view={view} setView={setView}
          bookmarkCount={bookmarkCount}
        />
        {inSearch && <SearchRow query={query} setQuery={setQuery} mode={mode} setMode={setMode} onSearch={onSearch} />}
        {inSearch && <TopFilters filters={filters} setFilters={setFilters} allResults={allResults} />}
        <div className={`main ${(inSearch && !hasSearched) ? 'empty-state' : ''}`}>
          {inDocuments ? (
            <DocumentsView
              onBack={() => setView('search')}
              tagsData={tagsData}
              setTagsData={setTagsData}
              watchedDir={status.watched_docs_dir || ''}
            />
          ) : inBookmarks ? (
            <BookmarksView
              bookmarks={bookmarks}
              setBookmarks={setBookmarks}
              onBack={() => setView('search')}
            />
          ) : loading ? (
            <div style={{ gridColumn: '1 / -1', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16, color: 'var(--fg2)', fontSize: 15 }}>
              <div style={{ width: 36, height: 36, border: '3px solid var(--border)', borderTopColor: 'var(--accent)', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }} />
              {lang === 'zh' ? '搜尋中...' : 'Searching...'}
            </div>
          ) : error ? (
            <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 12, color: 'var(--fg2)', fontSize: 15 }}>
              <div style={{ fontSize: 32 }}>⚠</div>
              <div style={{ fontWeight: 600 }}>{lang === 'zh' ? '搜尋失敗' : 'Search failed'}</div>
              <div style={{ fontSize: 13, opacity: 0.7 }}>{error}</div>
            </div>
          ) : !hasSearched ? (
            <div style={{ gridColumn: '1 / -1', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16, color: 'var(--fg2)', textAlign: 'center', padding: '0 32px' }}>
              <div style={{ fontSize: 48, opacity: 0.3 }}>🔍</div>
              <div style={{ fontSize: 18, fontWeight: 600, opacity: 0.6 }}>{lang === 'zh' ? '開始搜尋您的文件' : 'Search your documents'}</div>
              <div style={{ fontSize: 13, opacity: 0.45, maxWidth: 320 }}>
                {lang === 'zh'
                  ? '將 PDF、DOCX、XLSX、PPTX 放入 watched_docs 資料夾，輸入關鍵字即可搜尋'
                  : 'Drop PDF, DOCX, XLSX, or PPTX files into the watched_docs folder, then type a query above'}
              </div>
            </div>
          ) : (
            <>
              <FiltersRail filters={filters} setFilters={setFilters} allResults={allResults} tagsData={tagsData} setTagsData={setTagsData} />
              <div className="resizer" onMouseDown={onResizerMouseDown}>
                <div ref={resizerPillRef} className="resizer-pill" />
              </div>
              <ResultsPanel
                results={filtered}
                selectedId={selectedId}
                onSelect={setSelectedId}
                sortKey={sortKey}
                setSortKey={setSortKey}
                cardMode={cardMode}
                setCardMode={c => { setCardMode(c); setTweak('cardMode', c); }}
                totalMs={totalMs}
              />
              <div className="resizer" onMouseDown={onPreviewResizerMouseDown}>
                <div ref={previewPillRef} className="resizer-pill" />
              </div>
              <PreviewPanel result={selected} bookmarks={bookmarks} setBookmarks={setBookmarks} />
            </>
          )}
        </div>
        <StatusBar totalMs={totalMs} mode={mode} results={filtered} />

        <TweaksPanel title={prefsTitle}>

          <TweakSection label={lang === 'zh' ? '語言' : 'Language'}>
            <TweakRadio
              label={lang === 'zh' ? '介面語言' : 'Interface language'}
              value={lang}
              onChange={v => setLang(v)}
              options={[{ value: 'en', label: 'English' }, { value: 'zh', label: '繁中' }]}
            />
          </TweakSection>

          <TweakSection label={lang === 'zh' ? '外觀' : 'Appearance'}>
            <TweakRadio
              label={lang === 'zh' ? '主題' : 'Theme'}
              value={theme}
              onChange={v => setTheme(v)}
              options={[
                { value: 'light', label: lang === 'zh' ? '淺色' : 'Light' },
                { value: 'dark',  label: lang === 'zh' ? '深色' : 'Dark'  },
              ]}
            />
            <TweakSelect
              label={lang === 'zh' ? '強調色' : 'Accent color'}
              value={tweaks.accent}
              onChange={v => setTweak('accent', v)}
              options={[
                { value: 'indigo',  label: lang === 'zh' ? '靛藍 (預設)' : 'Indigo (default)' },
                { value: 'emerald', label: lang === 'zh' ? '翠綠'        : 'Emerald'           },
                { value: 'amber',   label: lang === 'zh' ? '琥珀'        : 'Amber'             },
                { value: 'slate',   label: lang === 'zh' ? '石板'        : 'Slate'             },
              ]}
            />
            <TweakRadio
              label={lang === 'zh' ? '標示樣式' : 'Highlight style'}
              value={tweaks.highlight}
              onChange={v => setTweak('highlight', v)}
              options={[
                { value: 'yellow',    label: lang === 'zh' ? '黃底' : 'Yellow'    },
                { value: 'underline', label: lang === 'zh' ? '底線' : 'Underline' },
                { value: 'bold',      label: lang === 'zh' ? '粗體' : 'Bold'      },
              ]}
            />
          </TweakSection>

          <TweakSection label={lang === 'zh' ? '字體' : 'Typography'}>
            <TweakSelect
              label={lang === 'zh' ? '字型配對' : 'Font pairing'}
              value={tweaks.typeset}
              onChange={v => setTweak('typeset', v)}
              options={[
                { value: 'inter-mono', label: 'Inter + JetBrains Mono'     },
                { value: 'ibm-plex',   label: 'IBM Plex Sans + Plex Mono'  },
                { value: 'serif-mono', label: 'Source Serif + JetBrains Mono' },
              ]}
            />
          </TweakSection>

          <TweakSection label={lang === 'zh' ? '版面' : 'Layout'}>
            <TweakRadio
              label={lang === 'zh' ? '篩選器' : 'Filters'}
              value={tweaks.layout}
              onChange={v => setTweak('layout', v)}
              options={[
                { value: 'sidebar',    label: lang === 'zh' ? '側欄' : 'Sidebar' },
                { value: 'topfilters', label: lang === 'zh' ? '頂部' : 'Top bar' },
              ]}
            />
            <TweakRadio
              label={lang === 'zh' ? '卡片樣式' : 'Card style'}
              value={tweaks.cardMode}
              onChange={v => { setTweak('cardMode', v); setCardMode(v); }}
              options={[
                { value: 'detailed', label: lang === 'zh' ? '詳細' : 'Detailed' },
                { value: 'compact',  label: lang === 'zh' ? '精簡' : 'Compact'  },
              ]}
            />
            <TweakSelect
              label={lang === 'zh' ? '密度' : 'Density'}
              value={tweaks.density}
              onChange={v => setTweak('density', v)}
              options={[
                { value: 'compact',  label: lang === 'zh' ? '精簡' : 'Compact'  },
                { value: 'balanced', label: lang === 'zh' ? '平衡' : 'Balanced' },
                { value: 'spacious', label: lang === 'zh' ? '寬鬆' : 'Spacious' },
              ]}
            />
          </TweakSection>

        </TweaksPanel>
      </div>
    </LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
