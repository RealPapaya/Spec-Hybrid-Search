<!doctype html>
<html lang="en" data-theme="light" data-layout="sidebar" data-density="balanced" data-accent="indigo" data-typeset="inter-mono" data-card="detailed" data-highlight="yellow">
<head>
<meta charset="utf-8" />
<title>DocSense — Local Document Search</title>
<meta name="viewport" content="width=1280" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* BIOS Spec Hybrid Search — base styles */
:root {
  /* Light mode tokens */
  --bg: #f7f7f5;
  --bg-elev: #ffffff;
  --bg-soft: #efefec;
  --bg-hover: #f0efeb;
  --bg-selected: #e8eef7;
  --bg-selected-strong: #dde7f5;
  --border: #e2e1dd;
  --border-strong: #c9c7c0;
  --border-focus: #1d4ed8;
  --fg: #18181b;
  --fg-muted: #54545a;
  --fg-faint: #8a8a8f;
  --accent: #1d4ed8;
  --accent-soft: #e0e9fb;
  --hl-bg: #fff3a8;
  --hl-bg-strong: #ffe066;
  --hl-fg: #3d2c00;
  --score-good: #197a4f;
  --score-mid: #a05a00;
  --score-low: #8a2a2a;
  --tag-intel: #0068b5;
  --tag-amd: #ed1c24;
  --tag-tcg: #5b21b6;
  --tag-uefi: #0d6e6e;
  --tag-pcisig: #b45309;
  --shadow-panel: 0 1px 0 rgba(0,0,0,0.04);

  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", "Menlo", "Consolas", monospace;
  --font-display: "Inter", system-ui, sans-serif;

  --row-h: 28px;
  --pad-x: 14px;
  --pad-y: 10px;
}

[data-theme="dark"] {
  --bg: #0d0e10;
  --bg-elev: #15171a;
  --bg-soft: #1a1c20;
  --bg-hover: #1e2126;
  --bg-selected: #1c2942;
  --bg-selected-strong: #243559;
  --border: #25272c;
  --border-strong: #383a40;
  --border-focus: #4f8cff;
  --fg: #e7e7ea;
  --fg-muted: #a4a4ab;
  --fg-faint: #6c6d74;
  --accent: #4f8cff;
  --accent-soft: #1a2540;
  --hl-bg: #5a4500;
  --hl-bg-strong: #806300;
  --hl-fg: #fff3a8;
  --score-good: #4ade80;
  --score-mid: #fbbf24;
  --score-low: #f87171;
  --tag-intel: #3aa0e8;
  --tag-amd: #ff5a60;
  --tag-tcg: #a78bfa;
  --tag-uefi: #2dd4bf;
  --tag-pcisig: #f59e0b;
  --shadow-panel: 0 1px 0 rgba(255,255,255,0.02);
}

/* Density variants */
[data-density="compact"] {
  --row-h: 24px;
  --pad-x: 10px;
  --pad-y: 6px;
}
[data-density="balanced"] {
  --row-h: 28px;
  --pad-x: 14px;
  --pad-y: 10px;
}
[data-density="spacious"] {
  --row-h: 34px;
  --pad-x: 18px;
  --pad-y: 14px;
}

/* Accent variants */
[data-accent="indigo"] { --accent: #1d4ed8; --accent-soft: #e0e9fb; --bg-selected: #e8eef7; --bg-selected-strong: #dde7f5; }
[data-accent="indigo"][data-theme="dark"] { --accent: #4f8cff; --accent-soft: #1a2540; --bg-selected: #1c2942; --bg-selected-strong: #243559; }
[data-accent="emerald"] { --accent: #047857; --accent-soft: #d1fae5; --bg-selected: #e7f5ee; --bg-selected-strong: #d2ebde; }
[data-accent="emerald"][data-theme="dark"] { --accent: #34d399; --accent-soft: #052e1f; --bg-selected: #102a20; --bg-selected-strong: #18402f; }
[data-accent="amber"] { --accent: #b45309; --accent-soft: #fef3c7; --bg-selected: #faf2e3; --bg-selected-strong: #f3e6cc; }
[data-accent="amber"][data-theme="dark"] { --accent: #f59e0b; --accent-soft: #2c1d05; --bg-selected: #2d2210; --bg-selected-strong: #41311a; }
[data-accent="slate"] { --accent: #334155; --accent-soft: #e2e8f0; --bg-selected: #e7eaef; --bg-selected-strong: #d4dae3; }
[data-accent="slate"][data-theme="dark"] { --accent: #94a3b8; --accent-soft: #1e293b; --bg-selected: #1c2330; --bg-selected-strong: #2a3344; }

/* Type pairing variants */
[data-typeset="inter-mono"] { --font-sans: "Inter", system-ui, sans-serif; --font-mono: "JetBrains Mono", monospace; --font-display: "Inter", sans-serif; }
[data-typeset="ibm-plex"] { --font-sans: "IBM Plex Sans", system-ui, sans-serif; --font-mono: "IBM Plex Mono", monospace; --font-display: "IBM Plex Sans", sans-serif; }
[data-typeset="serif-mono"] { --font-sans: "Inter", system-ui, sans-serif; --font-mono: "JetBrains Mono", monospace; --font-display: "Source Serif 4", Georgia, serif; }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.5;
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "cv02", "cv03", "cv04", "cv11", "ss01";
  overflow: hidden;
}

#root { height: 100%; }

/* App shell */
.app {
  height: 100vh;
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  background: var(--bg);
}

/* Header / topbar */
.topbar {
  display: flex;
  align-items: center;
  height: 44px;
  padding: 0 16px;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.topbar .brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: -0.01em;
  color: var(--fg);
}
.topbar .brand-mark {
  width: 18px; height: 18px;
  border-radius: 4px;
  background: var(--fg);
  position: relative;
  display: grid;
  place-items: center;
}
.topbar .brand-mark::after {
  content: "";
  width: 10px; height: 1.5px;
  background: var(--bg-elev);
  box-shadow: 0 -3px 0 var(--bg-elev), 0 3px 0 var(--bg-elev);
}
[data-theme="dark"] .topbar .brand-mark { background: var(--fg); }
[data-theme="dark"] .topbar .brand-mark::after { background: var(--bg); box-shadow: 0 -3px 0 var(--bg), 0 3px 0 var(--bg); }
.topbar .brand-name { font-weight: 600; }
.topbar .brand-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-faint);
  font-weight: 400;
  padding-left: 8px;
  margin-left: 4px;
  border-left: 1px solid var(--border);
}
.topbar .spacer { flex: 1; }
.topbar .meta {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-muted);
}
.topbar .meta .dot {
  display: inline-block;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--score-good);
  margin-right: 5px;
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--score-good) 25%, transparent);
}
.iconbtn {
  height: 26px;
  min-width: 26px;
  padding: 0 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  color: var(--fg-muted);
  border-radius: 5px;
  font: inherit;
  font-size: 11.5px;
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s, color 0.1s;
}
.iconbtn:hover { background: var(--bg-hover); color: var(--fg); border-color: var(--border-strong); }
.iconbtn svg { width: 13px; height: 13px; flex-shrink: 0; }
.iconbtn-settings {
  width: 28px;
  height: 28px;
  min-width: 28px;
  padding: 0;
  border-radius: 6px;
}
.iconbtn-settings svg {
  width: 15px;
  height: 15px;
  transition: transform .35s cubic-bezier(.34,1.56,.64,1);
}
.iconbtn-settings:hover { background: var(--bg-hover); border-color: var(--border-strong); }

/* Search bar row */
.searchrow {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 10px;
  align-items: center;
  padding: 12px 16px;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
}

.searchbox {
  position: relative;
  display: flex;
  align-items: center;
  height: 36px;
  border: 1px solid var(--border-strong);
  background: var(--bg);
  border-radius: 6px;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.searchbox:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
}
.searchbox .glass {
  width: 36px;
  display: grid;
  place-items: center;
  color: var(--fg-faint);
  flex-shrink: 0;
}
.searchbox .glass svg { width: 14px; height: 14px; }
.searchbox input {
  flex: 1;
  height: 100%;
  border: none;
  outline: none;
  background: transparent;
  color: var(--fg);
  font: inherit;
  font-size: 13.5px;
  font-family: var(--font-mono);
  padding-right: 12px;
}
.searchbox input::placeholder { color: var(--fg-faint); }
.searchbox .pre-clear {
  display: flex; align-items: center; gap: 4px;
  padding-right: 8px;
}
.searchbox kbd {
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 1px 5px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--fg-muted);
}

/* Mode selector segmented */
.mode {
  display: inline-flex;
  border: 1px solid var(--border-strong);
  border-radius: 6px;
  background: var(--bg);
  padding: 2px;
  height: 36px;
}
.mode button {
  border: none;
  background: transparent;
  font: inherit;
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-muted);
  padding: 0 12px;
  border-radius: 4px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.mode button:hover { color: var(--fg); }
.mode button.active {
  background: var(--bg-elev);
  color: var(--fg);
  box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 0 0 1px var(--border);
}
[data-theme="dark"] .mode button.active { box-shadow: 0 1px 0 rgba(0,0,0,0.4), 0 0 0 1px var(--border-strong); }
.mode button .mdot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--fg-faint);
}
.mode button.active .mdot { background: var(--accent); }

.searchbtn {
  height: 36px;
  padding: 0 16px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 6px;
  font: inherit;
  font-weight: 500;
  font-size: 12.5px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.searchbtn:hover { filter: brightness(1.05); }

/* Main grid: filters | resizer | results | resizer | preview */
.main {
  display: grid;
  grid-template-columns: var(--rail-w, 240px) 0 minmax(360px, 1fr) 0 var(--preview-w, 460px);
  min-height: 0;
  overflow: hidden;
}
[data-layout="topfilters"] .main {
  grid-template-columns: minmax(360px, 1fr) 0 var(--preview-w, 460px);
}

/* Resizer pill */
.resizer {
  position: relative;
  width: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: col-resize;
}
.resizer::before {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  left: -8px;
  width: 16px;
}
.resizer-pill {
  position: absolute;
  left: -4px;
  width: 8px;
  height: 28px;
  border-radius: 4px;
  background: transparent;
  cursor: col-resize;
  transition: background 0.15s, transform 0.15s;
  pointer-events: none;
}
.resizer:hover .resizer-pill,
.resizer-pill.dragging {
  background: var(--accent);
  transform: scaleX(1.25);
}
[data-layout="topfilters"] .filters-rail { display: none; }
[data-layout="topfilters"] .topfilters { display: flex; }

.topfilters {
  display: none;
  align-items: center;
  gap: 14px;
  padding: 8px 16px;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  font-size: 12px;
}
.topfilters .grp {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.topfilters .grp-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-faint);
}
.chip {
  height: 22px;
  padding: 0 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 500;
  color: var(--fg-muted);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  transition: all 0.1s;
}
.chip:hover { border-color: var(--border-strong); color: var(--fg); }
.chip.on {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.chip .ct { font-family: var(--font-mono); font-size: 10.5px; opacity: 0.7; }

/* Filters rail (sidebar) */
.filters-rail {
  border-right: none;
  background: var(--bg-elev);
  overflow-y: auto;
  padding: 4px 0;
}
.fgroup { padding: 12px 14px 4px; border-bottom: 1px dashed var(--border); }
.fgroup:last-child { border-bottom: none; }
.fgroup-title {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--fg-faint);
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.fgroup-title .clear {
  font-size: 10px;
  color: var(--accent);
  cursor: pointer;
  text-transform: none;
  letter-spacing: 0;
  font-family: var(--font-sans);
}
.fitem {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  cursor: pointer;
  font-size: 12.5px;
  color: var(--fg);
  user-select: none;
}
.fitem:hover { color: var(--fg); }
.fitem .checkbox {
  width: 13px; height: 13px;
  border: 1px solid var(--border-strong);
  border-radius: 3px;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  background: var(--bg);
}
.fitem.on .checkbox {
  background: var(--accent);
  border-color: var(--accent);
}
.fitem.on .checkbox svg {
  width: 9px; height: 9px;
  color: white;
}
.fitem .checkbox svg { display: none; }
.fitem.on .checkbox svg { display: block; }
.fitem .label { flex: 1; }
.fitem .count {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--fg-faint);
}
.fitem.on .count { color: var(--accent); }

.range-row {
  display: flex; align-items: center; gap: 6px;
  margin-top: 4px; margin-bottom: 6px;
}
.range-row input {
  flex: 1;
  height: 26px;
  padding: 0 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  font: inherit;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg);
  outline: none;
  min-width: 0;
}
.range-row input:focus { border-color: var(--accent); }
.range-row .dash { color: var(--fg-faint); }

/* Results panel */
.results {
  display: flex;
  flex-direction: column;
  border-right: none;
  background: var(--bg);
  overflow: hidden;
  min-width: 0;
}
.results-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
  height: 38px;
}
.results-head .ct {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--fg-muted);
}
.results-head .ct strong { color: var(--fg); font-weight: 600; }
.results-head .spacer { flex: 1; }
.results-head label {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--fg-faint);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.results-head select {
  height: 24px;
  padding: 0 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--fg);
  font: inherit;
  font-size: 11.5px;
  border-radius: 4px;
  outline: none;
  cursor: pointer;
}
.results-head select:hover { border-color: var(--border-strong); }
.results-head .layout-toggle {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.results-head .layout-toggle button {
  height: 24px;
  width: 26px;
  padding: 0;
  background: var(--bg);
  border: none;
  color: var(--fg-faint);
  cursor: pointer;
  display: grid;
  place-items: center;
}
.results-head .layout-toggle button.on { background: var(--bg-soft); color: var(--accent); }
.results-head .layout-toggle button svg { width: 12px; height: 12px; }

.result-list {
  flex: 1;
  overflow-y: auto;
}

.result {
  padding: var(--pad-y) var(--pad-x);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  display: grid;
  grid-template-columns: 44px 1fr;
  gap: 12px;
  transition: background 0.08s;
}
.result:hover { background: var(--bg-hover); }
.result.selected {
  background: var(--bg-selected);
}
.result.selected::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--accent);
}

.result .num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-faint);
  padding-top: 2px;
  text-align: right;
}
.result .body { min-width: 0; }
.result-row1 {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.result-row1 .specname {
  font-weight: 600;
  font-size: 13px;
  color: var(--fg);
  letter-spacing: -0.005em;
}
.result-row1 .ver {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--fg-faint);
  background: var(--bg-soft);
  padding: 1px 6px;
  border-radius: 3px;
}
.result-row1 .spacer { flex: 1; }
.result-row1 .score-pill {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 3px;
  background: var(--bg-soft);
  color: var(--score-good);
}
.result-row1 .score-pill.mid { color: var(--score-mid); }
.result-row1 .score-pill.low { color: var(--score-low); }

.tag {
  display: inline-flex;
  align-items: center;
  height: 17px;
  padding: 0 6px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.02em;
  border: 1px solid var(--border);
  background: var(--bg-soft);
  color: var(--fg-muted);
  text-transform: uppercase;
}
.tag-vendor { color: white; border: none; padding: 0 7px; }
.tag-vendor.intel { background: var(--tag-intel); }
.tag-vendor.amd { background: var(--tag-amd); }
.tag-vendor.tcg { background: var(--tag-tcg); }
.tag-vendor.uefiforum, .tag-vendor.uefi { background: var(--tag-uefi); }
.tag-vendor.pcisig { background: var(--tag-pcisig); }
.tag-vendor.cat { background: var(--bg-soft); color: var(--fg-muted); border: 1px solid var(--border); }

.result-row2 {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-muted);
  flex-wrap: wrap;
}
.result-row2 .sep { color: var(--fg-faint); }
.result-row2 .section { color: var(--fg); font-weight: 500; }
.result-row2 .pg { color: var(--fg-muted); }

.result .excerpt {
  font-size: 12.5px;
  line-height: 1.5;
  color: var(--fg-muted);
  -webkit-font-smoothing: antialiased;
}
.result .excerpt mark, .preview-text mark {
  background: var(--hl-bg);
  color: var(--hl-fg);
  padding: 0 2px;
  border-radius: 2px;
  font-weight: 600;
}
[data-highlight="underline"] .result .excerpt mark,
[data-highlight="underline"] .preview-text mark {
  background: transparent;
  color: var(--accent);
  text-decoration: underline;
  text-decoration-thickness: 2px;

<script>
// Custom tooltip — delegates from [data-tip] attributes
(function () {
  const el = document.getElementById('tip');
  let hideTimer;

  function show(text, x, y) {
    clearTimeout(hideTimer);
    el.textContent = text;
    // position: prefer below, flip above if clipped
    const GAP = 8;
    const rect = el.getBoundingClientRect();
    let top = y + GAP;
    if (top + rect.height > window.innerHeight - 8) top = y - rect.height - GAP;
    let left = x + GAP;
    if (left + rect.width > window.innerWidth - 8) left = x - rect.width - GAP;
    el.style.left = left + 'px';
    el.style.top  = top  + 'px';
    el.classList.add('visible');
  }

  function hide() {
    hideTimer = setTimeout(() => el.classList.remove('visible'), 80);
  }

  document.addEventListener('mouseover', function (e) {
    const target = e.target.closest('[data-tip]');
    if (!target) return;
    show(target.dataset.tip, e.clientX, e.clientY);
  });

  document.addEventListener('mousemove', function (e) {
    if (!el.classList.contains('visible')) return;
    const target = e.target.closest('[data-tip]');
    if (!target) return;
    const GAP = 8;
    let top  = e.clientY + GAP;
    let left = e.clientX + GAP;
    const w = el.offsetWidth, h = el.offsetHeight;
    if (top  + h > window.innerHeight - 8) top  = e.clientY - h - GAP;
    if (left + w > window.innerWidth  - 8) left = e.clientX - w - GAP;
    el.style.left = left + 'px';
    el.style.top  = top  + 'px';
  });

  document.addEventListener('mouseout', function (e) {
    const target = e.target.closest('[data-tip]');
    if (!target) return;
    hide();
  });

  document.addEventListener('click', hide);
  document.addEventListener('scroll', hide, true);
  document.addEventListener('keydown', hide);
})();
</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} data-tip={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>

}

// ─── Tags storage ─────────────────────────────────────────────────────────────
const TAGS_KEY = 'docsense_tags_v1';
const TAG_COLORS = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#84cc16'];

function loadTagsData() {
  try {
    const raw = JSON.parse(localStorage.getItem(TAGS_KEY) || 'null');
    if (raw && typeof raw === 'object' && Array.isArray(raw.customTags)) return raw;
  } catch(e) {}
  return { customTags: [], assignments: {} };
}
function saveTagsData(data) {
  try { localStorage.setItem(TAGS_KEY, JSON.stringify(data)); } catch(e) {}
}
function getFolderName(filepath) {
  if (!filepath) return '';
  const parts = filepath.replace(/\\/g, '/').split('/');
  return parts.length >= 2 ? parts[parts.length - 2] : '';
}

// ─── TagAssignMenu ─────────────────────────────────────────────────────────────
function TagAssignMenu({ doc_id, tagsData, setTagsData, anchorRect, onClose }) {
  const T = useT();
  const [newName, setNewName] = React.useState('');
  const menuRef = React.useRef(null);

  React.useEffect(() => {
    const handler = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) onClose(); };
    const khandler = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('mousedown', handler);
    document.addEventListener('keydown', khandler);
    return () => { document.removeEventListener('mousedown', handler); document.removeEventListener('keydown', khandler); };
  }, [onClose]);

  const assigned = tagsData.assignments[doc_id] || [];
  const toggle = (tagId) => {
    const cur = tagsData.assignments[doc_id] || [];
    const next = cur.includes(tagId) ? cur.filter(x => x !== tagId) : [...cur, tagId];
    const nd = { ...tagsData, assignments: { ...tagsData.assignments, [doc_id]: next } };
    setTagsData(nd); saveTagsData(nd);
  };
  const createTag = () => {
    const name = newName.trim(); if (!name) return;
    const id = Date.now().toString(36) + Math.random().toString(36).slice(2,5);
    const color = TAG_COLORS[tagsData.customTags.length % TAG_COLORS.length];
    const cur = tagsData.assignments[doc_id] || [];
    const nd = { customTags: [...tagsData.customTags, { id, name, color }], assignments: { ...tagsData.assignments, [doc_id]: [...cur, id] } };
    setTagsData(nd); saveTagsData(nd); setNewName('');
  };
  const top = Math.min(anchorRect.bottom + 4, window.innerHeight - 250);
  const left = Math.min(anchorRect.left, window.innerWidth - 220);

  return (
    <div className="tag-assign-menu" ref={menuRef} style={{ top, left }}>
      {tagsData.customTags.length > 0 && (
        <>
          <div className="menu-sect">{T('docs_tags_custom')}</div>
          {tagsData.customTags.map(tag => (
            <div key={tag.id} className={'tag-assign-item' + (assigned.includes(tag.id) ? ' on' : '')} onClick={() => toggle(tag.id)}>
              <div className="chk"></div>
              <span style={{ width: 8, height: 8, borderRadius: '50%', background: tag.color, flexShrink: 0, display: 'inline-block' }}></span>
              <span>{tag.name}</span>
            </div>
          ))}
        </>
      )}
      <div className="tag-assign-new">
        <input value={newName} onChange={e => setNewName(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') { createTag(); } e.stopPropagation(); }}
          placeholder={T('docs_new_tag')} autoFocus />
        <button onClick={createTag}>{T('docs_add')}</button>
      </div>
    </div>
  );
}

// ─── TagsFilterGroup ──────────────────────────────────────────────────────────
function TagsFilterGroup({ filters, setFilters, allResults, tagsData, setTagsData }) {
  const T = useT();
  const [newName, setNewName] = React.useState('');

  const folderCounts = React.useMemo(() => {
    const c = {};
    allResults.forEach(r => { const f = getFolderName(r.filepath); if (f) c[f] = (c[f]||0)+1; });
    return c;
  }, [allResults]);
  const folderNames = Object.keys(folderCounts).sort();
  const activeTags = filters.tags || [];

  const toggleTag = (key) => {
    const next = activeTags.includes(key) ? activeTags.filter(x => x !== key) : [...activeTags, key];
    setFilters({ ...filters, tags: next });
  };
  const createTag = () => {
    const name = newName.trim(); if (!name) return;
    const id = Date.now().toString(36) + Math.random().toString(36).slice(2,5);
    const color = TAG_COLORS[tagsData.customTags.length % TAG_COLORS.length];
    const nd = { ...tagsData, customTags: [...tagsData.customTags, { id, name, color }] };
    setTagsData(nd); saveTagsData(nd); setNewName('');
  };

  return (
    <div className="fgroup">
      <div className="fgroup-title">
        <span>{T('docs_tags')}</span>
        {activeTags.length > 0 && <span className="clear" onClick={() => setFilters({ ...filters, tags: [] })}>{T('f_clear')}</span>}
      </div>

      {folderNames.length > 0 && (
        <>
          <div className="fgroup-subsect">{T('docs_tags_folder')}</div>
          {folderNames.map(f => {
            const key = 'folder:' + f;
            const on = activeTags.includes(key);
            return (
              <div key={key} className={'fitem' + (on ? ' on' : '')} onClick={() => toggleTag(key)}>
                <div className="checkbox"><Icon.check /></div>
                <span className="label" style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                  <svg viewBox="0 0 14 14" width="12" height="12" fill="currentColor" style={{ opacity: 0.6, flexShrink: 0 }}><path d="M1 2.5A1 1 0 0 1 2 1.5h3.1a1 1 0 0 1 .71.3l.69.7H12a1 1 0 0 1 1 1V11a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2.5z"/></svg>
                  {f}
                </span>
                <span className="count">{folderCounts[f]}</span>
              </div>
            );
          })}
        </>
      )}

      {tagsData.customTags.length > 0 && (
        <>
          <div className="fgroup-subsect" style={{ paddingTop: folderNames.length ? 8 : 0 }}>{T('docs_tags_custom')}</div>
          {tagsData.customTags.map(tag => {
            const key = 'custom:' + tag.id;
            const on = activeTags.includes(key);
            return (
              <div key={key} className={'fitem' + (on ? ' on' : '')} onClick={() => toggleTag(key)}>
                <div className="checkbox"><Icon.check /></div>
                <span style={{ width: 8, height: 8, borderRadius: '50%', background: tag.color, flexShrink: 0, display: 'inline-block' }}></span>
                <span className="label">{tag.name}</span>
              </div>
            );
          })}
        </>
      )}

      <div className="new-tag-row">
        <input value={newName} onChange={e => setNewName(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') { createTag(); e.stopPropagation(); } e.stopPropagation(); }}
          placeholder={T('docs_new_tag')} />
        <button onClick={createTag}>{T('docs_add')}</button>
      </div>
    </div>
  );
}

function DocumentsView({ onBack, tagsData, setTagsData, watchedDir }) {
  const T = useT();
  const lang = React.useContext(LangCtx);
  const [docs, setDocs] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [viewMode, setViewMode] = React.useState('list');
  const [filterText, setFilterText] = React.useState('');
  const [activeTagFilter, setActiveTagFilter] = React.useState([]);

  React.useEffect(() => {
    fetch('/api/documents').then(r => r.json()).then(d => { setDocs(d.documents || []); setLoading(false); }).catch(() => setLoading(false));
  }, []);

  const filtered = React.useMemo(() => {
    let ds = docs;
    if (filterText.trim()) { const q = filterText.toLowerCase(); ds = ds.filter(d => d.filename.toLowerCase().includes(q) || d.filepath.toLowerCase().includes(q)); }
    if (activeTagFilter.length) {
      ds = ds.filter(doc => {
        const folder = getFolderName(doc.filepath);
        const assigned = tagsData.assignments[doc.doc_id] || [];
        return activeTagFilter.some(key => {
          if (key.startsWith('folder:')) return folder === key.slice(7);
          if (key.startsWith('custom:')) return assigned.includes(key.slice(7));
          return false;
        });
      });
    }
    return ds;
  }, [docs, filterText, activeTagFilter, tagsData]);

  const folderCounts = React.useMemo(() => {
    const c = {}; docs.forEach(d => { const f = getFolderName(d.filepath); if (f) c[f] = (c[f]||0)+1; }); return c;
  }, [docs]);

  const openDoc = (doc) => window.open('/api/file/' + encodeURIComponent(doc.doc_id), '_blank', 'noopener');

  const tree = React.useMemo(() => {
    const base = watchedDir ? watchedDir.replace(/\\/g, '/').replace(/\/$/, '') + '/' : null;
    const root = { name: lang === 'zh' ? '全部檔案' : 'All Files', children: {}, files: [] };
    filtered.forEach(doc => {
      const fullPath = doc.filepath.replace(/\\/g, '/');
      let rel = (base && fullPath.startsWith(base)) ? fullPath.slice(base.length) : doc.filename;
      const parts = rel.split('/'); parts.pop();
      let node = root;
      parts.forEach(part => {
        if (!part) return;
        if (!node.children[part]) node.children[part] = { name: part, children: {}, files: [] };
        node = node.children[part];
      });
      node.files.push(doc);
    });
    return root;
  }, [filtered, watchedDir, lang]);

  const toggleTagFilter = (key) => setActiveTagFilter(prev => prev.includes(key) ? prev.filter(k => k !== key) : [...prev, key]);

  return (
    <section className="docs-view">
      <div className="docs-toolbar">
        <button className="iconbtn" onClick={onBack}><Icon.back /> <span style={{ fontSize: 11 }}>{T('docs_back')}</span></button>
        <div style={{ width: 1, height: 16, background: 'var(--border)', flexShrink: 0 }}></div>
        <div className="searchbox" style={{ height: 28, flex: '0 1 260px' }}>

          <input value={filterText} onChange={e => setFilterText(e.target.value)} placeholder={T('docs_search')} style={{ fontSize: 12 }} />
        </div>
        <span className="spacer"></span>
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg-faint)' }}>

              <span key={key} className="tag-pill tag-pill-folder" style={{ height: 20, cursor: 'pointer' }} onClick={() => toggleTagFilter(key)}>{label} ×</span>
            );
          })}
          <span className="clear-all" onClick={() => setActiveTagFilter([])}>{T('f_clear')}</span>
        </div>
      )}

      <div style={{ flex: 1, display: 'flex', overflow: 'hidden', minHeight: 0 }}>
        {/* Left tag sidebar */}
        <div style={{ width: 196, flexShrink: 0, borderRight: '1px solid var(--border)', background: 'var(--bg-elev)', overflowY: 'auto', padding: '4px 0' }}>
          {Object.keys(folderCounts).length > 0 && (
            <div className="fgroup">
              <div className="fgroup-title"><span>{T('docs_tags_folder')}</span></div>
              {Object.entries(folderCounts).sort(([a],[b]) => a.localeCompare(b)).map(([f, ct]) => {
                const key = 'folder:' + f; const on = activeTagFilter.includes(key);
                return (
                  <div key={key} className={'fitem' + (on ? ' on' : '')} onClick={() => toggleTagFilter(key)}>
                    <div className="checkbox"><Icon.check /></div>
                    <span className="label" style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{f}</span>
                    <span className="count">{ct}</span>
                  </div>
                );
              })}
            </div>
          )}
          <div className="fgroup">
            <div className="fgroup-title">
              <span>{T('docs_tags_custom')}</span>
              {activeTagFilter.some(k => k.startsWith('custom:')) && <span className="clear" onClick={() => setActiveTagFilter(prev => prev.filter(k => !k.startsWith('custom:')))}>{T('f_clear')}</span>}
            </div>
            {tagsData.customTags.map(tag => {
              const key = 'custom:' + tag.id; const on = activeTagFilter.includes(key);
              return (
                <div key={key} className={'fitem' + (on ? ' on' : '')} onClick={() => toggleTagFilter(key)}>
                  <div className="checkbox"><Icon.check /></div>
                  <span style={{ width: 8, height: 8, borderRadius: '50%', background: tag.color, flexShrink: 0, display: 'inline-block' }}></span>
                  <span className="label">{tag.name}</span>
                </div>
              );
            })}
            <div className="new-tag-row" style={{ paddingTop: 8 }}>
              <input placeholder={lang === 'zh' ? '新增標籤...' : 'New tag...'}
                onKeyDown={e => {
                  if (e.key === 'Enter' && e.target.value.trim()) {
                    const name = e.target.value.trim();
                    const id = Date.now().toString(36) + Math.random().toString(36).slice(2,5);
                    const color = TAG_COLORS[tagsData.customTags.length % TAG_COLORS.length];
                    const nd = { ...tagsData, customTags: [...tagsData.customTags, { id, name, color }] };
                    setTagsData(nd); saveTagsData(nd); e.target.value = '';
                  }
                  e.stopPropagation();
                }}
              />
            </div>
          </div>
        </div>

        {/* Main content */}
        <div className="docs-body" style={{ flex: 1 }}>
          {loading ? (
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: 200 }}>
              <div style={{ width: 22, height: 22, border: '2px solid var(--border)', borderTopColor: 'var(--accent)', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }}/>
            </div>
          ) : filtered.length === 0 ? (
            <div className="empty"><div><div className="ico"><Icon.page /></div>{T('docs_empty')}</div></div>
          ) : viewMode === 'explorer' ? (
            <div className="explorer-root">
              {Object.entries(tree.children).sort(([a],[b]) => a.localeCompare(b)).map(([n, node]) => (
                <ExplorerNode key={n} name={n} {...node} depth={0} tagsData={tagsData} setTagsData={setTagsData} onOpenFile={openDoc} />
              ))}
              {tree.files.map(doc => (
                <ExplorerFileRow key={doc.doc_id} doc={doc} tagsData={tagsData} setTagsData={setTagsData} onOpen={openDoc} />
              ))}
            </div>
          ) : (
            <div className="doc-grid">
              {filtered.map(doc => (
                <DocCard key={doc.doc_id} doc={doc} tagsData={tagsData} setTagsData={setTagsData} onOpen={openDoc} />
              ))}
            </div>
          )}
        </div>
      </div>
    </section>
  );
}

// ─── API result mapper ────────────────────────────────────────────────────────
function mapResult(r, query, index) {
  const nameNoExt = r.filename.replace(/\.[^.]+$/, '');
  const ext = (r.filename.match(/\.([^.]+)$/) || ['', ''])[1].toUpperCase();
  const highlights = query.trim().split(/\s+/).filter(w => w.length > 2);
  return {
    id:            [r.doc_id, r.page || 0, index].join(':'),
    doc_id:        r.doc_id,
    filepath:      r.filepath || '',
    filename:      r.filename,
    score:         r.score         || 0,
    bm25:          r.bm25_score    || 0,
    semantic:      r.semantic_score || 0,
    spec:          nameNoExt,
    specShort:     r.filename,
    vendor:        nameNoExt,
    type:          ext,
    category:      '',
    version:       '',
    date:          '',
    page:          r.page || 0,
    section:       r.page ? 'Page ' + r.page : '',
    excerpt:       (r.chunk_text || '').slice(0, 320),
    highlight:     highlights,
    context:       { before: '', match: r.chunk_text || '', after: '' },
  };
}

        match: "4.6.1 — _OSC Capabilities Buffer\n\nThe _OSC method on a PCI host bridge accepts a capabilities buffer in which the OS indicates which features it intends to control natively (e.g., Native PCIe Hot Plug, AER, PME). The platform responds by either granting or masking each requested capability.",
        after: "Once _OSC has been evaluated for a given host bridge, subsequent invocations may not request additional capabilities. The OS may, however, invoke _OSC again with a reduced capability set to relinquish previously-granted control."

// ─── Helpers ──────────────────────────────────────────────────────────────────
function highlightText(text, terms) {
  if (!terms || !terms.length) return text;
  const sorted = [...terms].sort((a, b) => b.length - a.length);
  const escaped = sorted.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const pattern = new RegExp('(' + escaped.join('|') + ')', 'gi');
  const parts = text.split(pattern);
  return parts.map((p, i) =>
    pattern.test(p) ? <mark key={i}>{p}</mark> : <React.Fragment key={i}>{p}</React.Fragment>
  );
}
function vendorClass(v) { return v.toLowerCase().replace(/[^a-z]/g, ''); }
function scoreClass(s) { return s >= 0.9 ? '' : s >= 0.85 ? ' mid' : ' low'; }

// ─── FiltersRail ──────────────────────────────────────────────────────────────
function FiltersRail({ filters, setFilters, allResults, tagsData, setTagsData }) {
  const T = useT();
  const { vendors, types, counts } = React.useMemo(() => {
    const c = { vendor: {}, type: {} };
    allResults.forEach(r => {
      if (r.vendor) c.vendor[r.vendor] = (c.vendor[r.vendor] || 0) + 1;
      if (r.type)   c.type[r.type]     = (c.type[r.type]     || 0) + 1;
    });
    return {
      vendors: Object.keys(c.vendor).sort(),
      types:   Object.keys(c.type).sort(),
      counts:  c,
    };
  }, [allResults]);

  const toggle = (key, id) => {
    const cur = filters[key];
    setFilters({ ...filters, [key]: cur.includes(id) ? cur.filter(x => x !== id) : [...cur, id] });
  };
  const clear = (key) => setFilters({ ...filters, [key]: [] });

  return (
    <aside className="filters-rail">
      <FilterGroup title={T('f_vendor')}    items={vendors.map(v => ({ id: v, label: v, count: counts.vendor[v] || 0 }))} selected={filters.vendor} onToggle={id => toggle('vendor', id)} onClear={() => clear('vendor')} clearLabel={T('f_clear')} />
      <FilterGroup title={T('f_spec_type')} items={types.map(t   => ({ id: t, label: t, count: counts.type[t]   || 0 }))} selected={filters.type}   onToggle={id => toggle('type',   id)} onClear={() => clear('type')}   clearLabel={T('f_clear')} />
      <TagsFilterGroup filters={filters} setFilters={setFilters} allResults={allResults} tagsData={tagsData} setTagsData={setTagsData} />
    </aside>
  );
}
