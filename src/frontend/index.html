<!doctype html>
<html lang="en" data-theme="light" data-layout="sidebar" data-density="balanced" data-accent="indigo" data-font-sans="jetbrains-mono" data-font-mono="jetbrains-mono" data-font-display="jetbrains-mono" data-card="detailed" data-highlight="yellow">
<head>
<meta charset="utf-8" />
<title>DocSense — Local Document Search</title>
<meta name="viewport" content="width=1280" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:wght@500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
</head>
<body>
<div id="root"></div>
<div id="tip"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="tooltip.js"></script>

<!-- 1. Utilities (no inter-module deps; pure helpers + i18n + storage) -->
<script type="text/babel" src="lib/helpers.js"></script>
<script type="text/babel" src="lib/lang.jsx"></script>
<script type="text/babel" src="lib/confirm.jsx"></script>
<script type="text/babel" src="lib/prefs.js"></script>
<script type="text/babel" src="lib/tags.js"></script>
<script type="text/babel" src="lib/bookmarks.js"></script>
<script type="text/babel" src="lib/api.js"></script>

<!-- 2. Shared UI shell (Tweaks/Preferences floating panel) -->
<script type="text/babel" src="tweaks/TweaksPanel.jsx"></script>

<!-- 3. Components (TagAssignMenu must precede DocumentsView which uses it) -->
<script type="text/babel" src="components/TagAssignMenu.jsx"></script>
<script type="text/babel" src="components/Topbar.jsx"></script>
<script type="text/babel" src="components/SearchRow.jsx"></script>
<script type="text/babel" src="components/FiltersRail.jsx"></script>
<script type="text/babel" src="components/ResultsPanel.jsx"></script>
<script type="text/babel" src="components/PreviewPanel.jsx"></script>
<script type="text/babel" src="components/StatusBar.jsx"></script>

<!-- 4. Views (depend on components + TagAssignMenu) -->
<script type="text/babel" src="views/DocumentsView.jsx"></script>
<script type="text/babel" src="views/BookmarksView.jsx"></script>

<!-- 5. Entry — App + ReactDOM.render (must load last) -->
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
